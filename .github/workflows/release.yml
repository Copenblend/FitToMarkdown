name: Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version override (leave empty to use FitToMarkdown.Version.props)'
        required: false
        default: ''
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' FitToMarkdown.Version.props)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Restore
        run: dotnet restore FitToMarkdown.sln

      - name: Build
        run: >
          dotnet build FitToMarkdown.sln
          --configuration ${{ github.event.inputs.configuration }}
          --no-restore
          -warnaserror
          -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: >
          dotnet test FitToMarkdown.sln
          --configuration ${{ github.event.inputs.configuration }}
          --no-build
          --verbosity normal

      - name: Publish (win-x64)
        run: >
          dotnet publish src/FitToMarkdown.Cli/FitToMarkdown.Cli.csproj
          --configuration ${{ github.event.inputs.configuration }}
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:Version=${{ steps.version.outputs.version }}
          --output ./publish/win-x64

      - name: Publish (linux-x64)
        run: >
          dotnet publish src/FitToMarkdown.Cli/FitToMarkdown.Cli.csproj
          --configuration ${{ github.event.inputs.configuration }}
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:Version=${{ steps.version.outputs.version }}
          --output ./publish/linux-x64

      - name: Publish (osx-x64)
        run: >
          dotnet publish src/FitToMarkdown.Cli/FitToMarkdown.Cli.csproj
          --configuration ${{ github.event.inputs.configuration }}
          --runtime osx-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:Version=${{ steps.version.outputs.version }}
          --output ./publish/osx-x64

      - name: Package artifacts
        shell: bash
        run: |
          cd publish
          tar -czf ../FitToMarkdown-${{ steps.version.outputs.version }}-win-x64.tar.gz -C win-x64 .
          tar -czf ../FitToMarkdown-${{ steps.version.outputs.version }}-linux-x64.tar.gz -C linux-x64 .
          tar -czf ../FitToMarkdown-${{ steps.version.outputs.version }}-osx-x64.tar.gz -C osx-x64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: FitToMarkdown v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            FitToMarkdown-${{ steps.version.outputs.version }}-win-x64.tar.gz
            FitToMarkdown-${{ steps.version.outputs.version }}-linux-x64.tar.gz
            FitToMarkdown-${{ steps.version.outputs.version }}-osx-x64.tar.gz
